version: "3.9"

services:
  # ─── Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ─── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://scraper:scraper_pass@postgres:5432/scraper_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - OLLAMA_URL=http://ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    mem_limit: 512m

  # ─── Celery Worker ─────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.scheduler.worker worker --loglevel=info --concurrency=8 -Q scrape_high,scrape_medium,scrape_low,heal,notify
    environment:
      - DATABASE_URL=postgresql+asyncpg://scraper:scraper_pass@postgres:5432/scraper_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
      - OLLAMA_URL=http://ollama:11434
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 1g

  # ─── Celery Beat (Scheduler) ───────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: celery -A backend.scheduler.worker beat --loglevel=info --scheduler=apscheduler.schedulers.background:BackgroundScheduler
    environment:
      - DATABASE_URL=postgresql+asyncpg://scraper:scraper_pass@postgres:5432/scraper_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_BROKER_URL=redis://redis:6379/1
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m

  # ─── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_BASE_URL=ws://localhost:8000
    restart: unless-stopped
    mem_limit: 256m

  # ─── PostgreSQL 17 ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: scraper_db
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d scraper_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 2g

  # ─── Redis 7 ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ""
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m

  # ─── Ollama (AI Pipeline, optional) ───────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    mem_limit: 4g
    # GPU support (uncomment if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    profiles:
      - ai  # docker compose --profile ai up

volumes:
  pgdata:
  redisdata:
  ollama_models:
