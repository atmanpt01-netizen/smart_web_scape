name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --dev
        working-directory: smart-web-scraper
      - name: Ruff lint
        run: uv run ruff check backend/
        working-directory: smart-web-scraper
      - name: Ruff format check
        run: uv run ruff format --check backend/
        working-directory: smart-web-scraper
      - name: Mypy type check
        run: uv run mypy backend/ --ignore-missing-imports
        working-directory: smart-web-scraper

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --dev
        working-directory: smart-web-scraper
      - name: Run tests
        run: uv run pytest tests/ -v --cov=backend --cov-report=xml --cov-fail-under=70
        working-directory: smart-web-scraper
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "test-secret-key-for-ci-only"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: smart-web-scraper/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    name: Frontend — Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: smart-web-scraper/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: smart-web-scraper/frontend
      - name: Type check
        run: npx tsc --noEmit
        working-directory: smart-web-scraper/frontend
      - name: Build
        run: npm run build
        working-directory: smart-web-scraper/frontend

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: smart-web-scraper
          file: smart-web-scraper/Dockerfile.backend
          push: false
          tags: smart-web-scraper/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: smart-web-scraper
          file: smart-web-scraper/Dockerfile.frontend
          push: false
          tags: smart-web-scraper/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
